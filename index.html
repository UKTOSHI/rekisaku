<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歴索（レキサク）— 歴史時代別 社会科見学スポット</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --primary:   #6c63ff;
  --pink:      #ff6584;
  --accent:    #43c6ac;
  --gold:      #ffb347;
  --bg:        #f0f4ff;
  --white:     #ffffff;
  --text:      #2d3748;
  --muted:     #718096;
  --light:     #edf2f7;
  --border:    #e2e8f0;
  --free-bg:   #e8f5ee;
  --free-tx:   #2d7a4f;
  --serif:     'Noto Serif JP', serif;
  --sans:      'Noto Sans JP', sans-serif;
  --radius:    12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

/* ヘッダー */
header{background:linear-gradient(135deg,#6c63ff 0%,#ff6584 100%);color:#fff;padding:1.25rem 1.5rem;display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap;box-shadow:0 4px 16px rgba(108,99,255,.3)}
.site-name{font-family:var(--serif);font-size:2.25rem;font-weight:700;letter-spacing:.12em;text-shadow:0 2px 12px rgba(0,0,0,.2)}
.site-tagline{font-size:.8rem;color:rgba(255,255,255,.9);letter-spacing:.08em;font-weight:500}

/* 時代タブ */
.era-bar{background:#fff;border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none;box-shadow:0 2px 8px rgba(108,99,255,.08)}
.era-bar::-webkit-scrollbar{display:none}
.era-tabs{display:flex;gap:0;padding:.25rem 1rem;min-width:max-content}
.era-tab{font-family:var(--serif);font-size:.82rem;color:var(--muted);padding:.6rem .9rem;border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;letter-spacing:.03em;font-weight:500}
.era-tab:hover{color:var(--primary)}
.era-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}

/* 時代メタ情報 */
.era-meta{background:var(--white);border-bottom:2px solid var(--border);padding:.75rem 1.5rem;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.era-meta-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.2rem;flex-wrap:wrap}
.era-meta-name{font-family:var(--serif);font-size:2.2rem;font-weight:700;line-height:1.1}
.era-period{font-size:1rem;color:var(--muted);margin-bottom:.5rem;font-weight:500}
.era-img-wrap{flex-shrink:0;margin-top:.75rem}
.era-img{width:110px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--border);display:block;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.era-img-credit{font-size:.58rem;color:var(--muted);text-align:right;margin-top:.2rem;line-height:1.3}

.era-desc{font-size:.85rem;color:#4a5568;line-height:1.8;max-width:700px;margin-bottom:.75rem}
.score-wrap{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
.score-donut-wrap{position:relative;width:72px;height:72px;flex-shrink:0}
.score-donut-wrap canvas{position:absolute;top:0;left:0}
.score-donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;line-height:1.2}
.score-donut-pct{font-size:.85rem;font-weight:700;color:var(--primary)}
.score-donut-sub{font-size:.55rem;color:var(--muted)}
.score-badge{font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:700;background:linear-gradient(135deg,#fff3cd,#ffeaa7);color:#856404;border:1px solid #f0c040;box-shadow:0 1px 4px rgba(240,192,64,.3)}
.era-tech{font-size:.82rem;color:#4a5568;line-height:1.8;max-width:700px;border-left:3px solid var(--primary);padding:.5rem .75rem;margin-top:.5rem;background:rgba(108,99,255,.05);border-radius:0 8px 8px 0}
.era-stats{display:flex;gap:1.25rem;align-items:flex-start;margin-top:.75rem;flex-wrap:wrap}
.stat-pop{display:flex;flex-direction:column;gap:.2rem;align-items:center}
.stat-pop-label{font-size:.68rem;color:var(--muted);text-align:center;font-weight:500}
.stat-pop-val{font-size:1.3rem;font-weight:700;font-family:var(--serif);color:var(--primary);line-height:1;text-align:center}
.stat-pop-unit{font-size:.68rem;color:var(--muted);text-align:center}
.stat-age{display:flex;flex-direction:column;gap:.2rem;align-items:center}
.age-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:#4a5568;line-height:1.4;text-align:center}
.life-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:#4a5568;line-height:1.4;text-align:center}
.stat-avgage{display:flex;flex-direction:column;gap:.2rem;align-items:center}
.avgage-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:#4a5568;line-height:1.4;text-align:center}
.stat-chart-label{font-size:.68rem;color:var(--muted);text-align:center;font-weight:500}
.donut-wrap{position:relative;width:72px;height:72px}
.donut-wrap canvas{position:absolute;top:0;left:0}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;line-height:1.2}
.donut-pct{font-size:.85rem;font-weight:700;color:var(--text)}
.donut-sub{font-size:.55rem;color:var(--muted)}
.stat-speed{display:flex;flex-direction:column;gap:.3rem;align-items:center}
.speed-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:#4a5568;line-height:1.2;text-align:center}
.speed-desc{font-size:.68rem;color:var(--muted);line-height:1.4;max-width:160px;text-align:center}
.stat-industry{display:flex;flex-direction:column;gap:.3rem;align-items:center}
.industry-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:#4a5568;line-height:1.4;text-align:center}
.stat-media{display:flex;flex-direction:column;gap:.3rem;align-items:center}
.media-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:#4a5568;line-height:1.4;text-align:center}
.stat-gov{display:flex;flex-direction:column;gap:.3rem;align-items:center}
.gov-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:#4a5568;line-height:1.4;text-align:center}
.stat-life{display:flex;flex-direction:column;gap:.2rem;align-items:center}

/* フィルター行 */
.filters{padding:.75rem 1.5rem;display:flex;gap:.5rem;flex-wrap:wrap;border-bottom:2px solid var(--border);background:#fff}
.filter-btn{font-size:.78rem;padding:.35rem .85rem;border-radius:20px;border:2px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-family:var(--sans);transition:all .15s;font-weight:500}
.filter-btn:hover{border-color:var(--primary);color:var(--primary);background:rgba(108,99,255,.05)}
.filter-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(108,99,255,.3)}
.filter-sep{width:1px;background:var(--border);margin:.1rem 0;align-self:stretch}

/* インフラ分類フィルター */
.infra-filter-bar{
  padding:.6rem 1.5rem;
  background:#fafbff;
  border-bottom:2px solid var(--border);
  display:none;
  flex-direction:column;
  gap:.5rem;
}
.infra-filter-bar.visible{display:flex}
.infra-filter-label{
  font-size:.72rem;
  color:var(--primary);
  font-weight:700;
  letter-spacing:.05em;
  display:flex;
  align-items:center;
  gap:.4rem;
}
.infra-filter-label::before{
  content:'';
  display:inline-block;
  width:3px;height:12px;
  background:var(--primary);
  border-radius:2px;
}
.infra-btns{display:flex;gap:.4rem;flex-wrap:wrap}
.infra-btn{
  font-size:.75rem;
  padding:.35rem .8rem;
  border-radius:20px;
  border:2px solid var(--border);
  background:#fff;
  color:var(--muted);
  cursor:pointer;
  font-family:var(--sans);
  transition:all .15s;
  white-space:nowrap;
  font-weight:500;
}
.infra-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(67,198,172,.05)}
.infra-btn.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  font-weight:600;
  box-shadow:0 2px 8px rgba(67,198,172,.3);
}

/* スポットグリッド */
.main{padding:1.25rem 1.5rem}
.spots-count{font-size:.8rem;color:var(--muted);margin-bottom:1rem;font-weight:500}
.spots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

/* スポットカード */
.spot-card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:.5rem;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.spot-card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:0 8px 20px rgba(108,99,255,.15)}
.spot-card.recommend .spot-name{color:var(--primary)}
.spot-stars{font-size:.75rem;line-height:1;letter-spacing:.05em}
.star-filled{color:var(--gold)}
.star-empty{display:none}
.spot-pref{font-size:.72rem;color:var(--muted);letter-spacing:.05em;font-weight:500}
.spot-name{font-family:var(--serif);font-size:1.05rem;font-weight:700;color:var(--text);line-height:1.4}
.spot-desc{font-size:.8rem;color:#4a5568;line-height:1.65;flex:1}
.spot-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.25rem}
.tag{font-size:.68rem;padding:.25rem .55rem;border-radius:6px;border:1px solid var(--border);color:var(--muted);font-weight:500}
.tag.free{background:#e8f5ee;border-color:#9edbb8;color:#2d7a4f;font-weight:600}
.tag.reserve{background:#fff8ec;border-color:#f0c87a;color:#7a5a10}
.tag.recommend{background:#fef0ff;border-color:#d8a0e8;color:#7a30a0}
.tag.infra{background:#f0f4ff;border-color:#a0b4f8;color:#3050b8;font-weight:600}
.spot-access{font-size:.72rem;color:var(--accent);margin-top:.25rem;line-height:1.5;font-weight:500}
.spot-stars{font-size:.72rem;letter-spacing:-.05em;margin-left:.3rem}
.spot-stars[data-rating="3"]{color:var(--gold)}
.spot-stars[data-rating="2"]{color:#c0c8d0}
.spot-stars[data-rating="1"]{color:#d8dce0}

/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;padding:1.75rem;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--bg);border:none;font-size:1rem;color:var(--muted);cursor:pointer;line-height:1;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;transition:background .15s}
.modal-close:hover{background:var(--border)}
.modal-pref{font-size:.78rem;color:var(--muted);margin-bottom:.25rem;font-weight:500}
.modal-name{font-family:var(--serif);font-size:1.5rem;font-weight:700;margin-bottom:.5rem;line-height:1.4;color:var(--text)}
.modal-desc{font-size:.88rem;color:#4a5568;line-height:1.85;margin-bottom:1rem}
.modal-rows{display:flex;flex-direction:column;gap:.6rem;font-size:.82rem;background:var(--bg);border-radius:10px;padding:1rem}
.modal-row{display:flex;gap:.75rem}
.modal-label{color:var(--muted);flex-shrink:0;width:75px;font-weight:600;font-size:.78rem}
.modal-val{color:var(--text);line-height:1.5}
.modal-link{color:var(--primary);word-break:break-all;font-weight:500}
.modal-eras{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem}
.era-chip{font-size:.72rem;padding:.3rem .7rem;border-radius:20px;border:2px solid;font-family:var(--serif);font-weight:600}

/* 空・ローディング */
.state-msg{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.9rem}
.loading-dots{display:inline-flex;gap:.4rem}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:bounce .8s infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px)}}

/* フッター */
footer{text-align:center;padding:2rem;font-size:.75rem;color:var(--muted);border-top:2px solid var(--border);margin-top:2rem;background:#fff}

@media(max-width:600px){
  .main{padding:1rem}
  .spots-grid{grid-template-columns:1fr}
  header{padding:1rem}
  .site-name{font-size:1.7rem}
  .filters{padding:.5rem 1rem}
  .infra-filter-bar{padding:.5rem 1rem}
  .era-img{width:80px;height:60px}
}
</style>
</head>

<script>
const SUPABASE_URL  = 'https://sunxpjbdvidftukiutxg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1bnhwamJkdmlkZnR1a2l1dHhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU1MDUsImV4cCI6MjA5MDEzMTUwNX0.L9RU4U3kWy4CJzyVR4FEKUrDX8fD2jzWAbQxyaDOIsU';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let eras        = [];
let allSpots    = [];
let spotEraMap  = {};
let spotTagMap  = {};
let currentEra  = null;
let currentPref = '';
let freeOnly    = false;
let selectedInfra = '';

async function fetchWikipediaThumbnails() {
  const targets = eras.filter(e => e.image_url && !e.image_url.startsWith('http'));
  await Promise.all(targets.map(async era => {
    try {
      const isEn  = era.image_url.startsWith('en:');
      const lang  = isEn ? 'en' : 'ja';
      const title = isEn ? era.image_url.slice(3) : era.image_url;
      const res = await fetch(
        'https://' + lang + '.wikipedia.org/api/rest_v1/page/summary/' +
        encodeURIComponent(title)
      );
      const data = await res.json();
      era.image_url = data.thumbnail?.source || null;
    } catch {
      era.image_url = null;
    }
  }));
}

async function init() {
  const { data: eraData } = await db.from('eras').select('*').order('sort_order');
  eras = eraData || [];
  await fetchWikipediaThumbnails();
  buildEraTabs();

  const { data: spotData } = await db
    .from('spots')
    .select('*, prefectures(name), infra_category')
    .eq('status', true);
  allSpots = spotData || [];

  const { data: seData } = await db
    .from('spot_eras')
    .select('spot_id, eras(code, name_ja, color_hex)');
  (seData || []).forEach(r => {
    if (!spotEraMap[r.spot_id]) spotEraMap[r.spot_id] = [];
    spotEraMap[r.spot_id].push(r.eras);
  });

  const { data: stData } = await db
    .from('spot_tags')
    .select('spot_id, tags(name, category)');
  (stData || []).forEach(r => {
    if (!spotTagMap[r.spot_id]) spotTagMap[r.spot_id] = [];
    spotTagMap[r.spot_id].push(r.tags.name);
  });

  if (eras.length) selectEra(eras[0]);
}

function buildEraTabs() {
  const container = document.getElementById('era-tabs');
  eras.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'era-tab';
    btn.textContent = e.name_ja;
    btn.onclick = () => selectEra(e);
    btn.id = 'era-tab-' + e.id;
    container.appendChild(btn);
  });
}

function selectEra(era) {
  currentEra = era;
  document.querySelectorAll('.era-tab').forEach(b => b.classList.remove('active'));
  const tab = document.getElementById('era-tab-' + era.id);
  if (tab) {
    tab.classList.add('active');
    tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  const zaibatsuEras = ['meiji','taisho','showa','showa_mid','heisei','gendai'];
  document.getElementById('zaibatsu-bar').style.display =
    zaibatsuEras.includes(era.code) ? 'block' : 'none';

  const infraBar = document.getElementById('infra-filter-bar');
  if (era.code === 'gendai') {
    infraBar.classList.add('visible');
  } else {
    infraBar.classList.remove('visible');
    selectedInfra = '';
    document.querySelectorAll('.infra-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.infra === '');
    });
  }

  const meta = document.getElementById('era-meta');
  meta.querySelector('.era-meta-name').textContent = era.name_ja + '時代';
  meta.querySelector('.era-meta-name').style.color = era.color_hex || '#c8b89a';
  meta.querySelector('.era-period').textContent = era.period;
  meta.querySelector('.era-desc').textContent = era.description || '';

  const imgWrap = document.getElementById('era-img-wrap');
  const imgEl   = document.getElementById('era-img');
  if (era.image_url) {
    imgEl.src = era.image_url;
    imgEl.alt = era.name_ja + '時代の代表的なスポット';
    imgWrap.style.display = 'block';
  } else {
    imgWrap.style.display = 'none';
  }

  const score = era.human_labor_score;
  const scoreWrap = document.getElementById('score-wrap');
  if (score != null) {
    scoreWrap.style.display = 'flex';
    const color = score > 60 ? '#8b6f47' : score > 45 ? '#c9923a' : '#2d6fa8';
    const num = document.getElementById('score-num');
    num.textContent = score + '%';
    num.style.color = color;
    drawDonut(score, color, 'score-donut-canvas');
    const revolutions = {meiji:'★第1革命 蒸気・電気', showa_mid:'★第2革命 三種の神器', heisei:'★第3革命 インターネット', gendai:'★第4革命 AI'};
    const badge = document.getElementById('score-badge');
    const badgeWrap = document.getElementById('score-badge-wrap');
    if (revolutions[era.code]) {
      badge.textContent    = revolutions[era.code];
      badgeWrap.style.display = 'block';
    } else {
      badgeWrap.style.display = 'none';
    }
  } else {
    scoreWrap.style.display = 'none';
  }

  const techEl = document.getElementById('era-tech');
  if (era.technology) {
    techEl.textContent    = era.technology;
    techEl.style.display  = 'block';
  } else {
    techEl.style.display  = 'none';
  }

  const statsEl = document.getElementById('era-stats');
  if (era.population_man != null) {
    statsEl.style.display = 'flex';
    document.getElementById('stat-pop-val').textContent =
      era.population_man >= 10000
        ? (era.population_man / 10000).toFixed(1) + '億'
        : era.population_man.toLocaleString();
    document.querySelector('.stat-pop-unit').textContent =
      era.population_man >= 10000 ? '人' : '万人';

    const lifeEl = document.getElementById('stat-life');
    if (era.life_expectancy) {
      lifeEl.style.display = 'flex';
      lifeEl.style.flexBasis = '';
      lifeEl.style.flexDirection = 'column';
      lifeEl.style.alignItems = 'center';
      lifeEl.style.gap = '0.2rem';
      document.getElementById('life-val').textContent = era.life_expectancy;
    } else {
      lifeEl.style.display = 'none';
    }

    const avgAgeEl = document.getElementById('stat-avgage');
    if (era.avg_age != null) {
      avgAgeEl.style.display = 'flex';
      document.getElementById('avgage-val').textContent = '約' + era.avg_age + '歳';
    } else {
      avgAgeEl.style.display = 'none';
    }

    const rate   = era.farming_rate ?? 0;
    document.getElementById('donut-pct').textContent = rate + '%';
    drawDonut(rate, era.color_hex || '#c9923a', 'donut-canvas');

    const speedEl = document.getElementById('stat-speed');
    const animal = era.speed_animal;
    if (animal) {
      speedEl.style.display = 'flex';
      document.getElementById('speed-val').textContent = animal;
      document.getElementById('speed-desc').textContent = '';
    } else {
      speedEl.style.display = 'none';
    }

    const indEl = document.getElementById('stat-industry');
    if (era.main_industries) {
      indEl.style.display = 'flex';
      document.getElementById('industry-val').textContent = era.main_industries;
    } else {
      indEl.style.display = 'none';
    }

    const mediaEl = document.getElementById('stat-media');
    if (era.info_media) {
      mediaEl.style.display = 'flex';
      document.getElementById('media-val').textContent = era.info_media;
    } else {
      mediaEl.style.display = 'none';
    }

    const govEl = document.getElementById('stat-gov');
    if (era.government_system) {
      govEl.style.display = 'flex';
      document.getElementById('gov-val').textContent = era.government_system;
    } else {
      govEl.style.display = 'none';
    }
  } else {
    statsEl.style.display = 'none';
  }

  renderSpots();
}

function renderSpots() {
  const eraSpotIds = new Set(
    Object.entries(spotEraMap)
      .filter(([, eras]) => eras.some(e => e.code === currentEra.code))
      .map(([id]) => id)
  );
  let filtered = allSpots.filter(s => eraSpotIds.has(s.id));
  if (currentPref) filtered = filtered.filter(s => s.prefectures?.name === currentPref);
  if (freeOnly)    filtered = filtered.filter(s => s.is_free);

  if (currentEra?.code === 'gendai' && selectedInfra) {
    filtered = filtered.filter(s => s.infra_category === selectedInfra);
  }

  const grid  = document.getElementById('spots-grid');
  const count = document.getElementById('spots-count');
  count.textContent = filtered.length + ' 件のスポット';

  if (!filtered.length) {
    grid.innerHTML = '<div class="state-msg">このエリアのスポットは現在収集中です</div>';
    return;
  }
  grid.innerHTML = '';
  filtered.sort((a, b) => (b.star_rating || 3) - (a.star_rating || 3));
  filtered.forEach(s => {
    const tags  = spotTagMap[s.id] || [];
    const card  = document.createElement('div');
    const isRecommend = tags.includes('おすすめ');
    card.className = 'spot-card' + (isRecommend ? ' recommend' : '');
    card.onclick   = () => openModal(s);
    const tagHtml = tags.map(t => {
      let cls = 'tag';
      if (t === '無料') cls += ' free';
      if (t === '要予約') cls += ' reserve';
      if (t === 'おすすめ') cls += ' recommend';
      return `<span class="${cls}">${t}</span>`;
    }).join('');
    const stars = Math.min(s.star_rating || 3, 3);
    const starHtml = '<span class="star-filled">' + '★'.repeat(stars) + '</span><span class="star-empty">' + '☆'.repeat(3 - stars) + '</span>';
    const infraTagHtml = (currentEra?.code === 'gendai' && s.infra_category)
      ? `<span class="tag infra">${s.infra_category}</span>`
      : '';

    card.innerHTML = `
      <div class="spot-pref">${s.prefectures?.name || ''} <span class="spot-stars" data-rating="${stars}">${starHtml}</span></div>
      <div class="spot-name">${s.name}</div>
      <div class="spot-desc">${(s.description || '').slice(0, 80)}${(s.description || '').length > 80 ? '…' : ''}</div>
      <div class="spot-tags">${infraTagHtml}${tagHtml}</div>
      ${s.access_info ? `<div class="spot-access">${s.access_info}</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function openModal(s) {
  const tags   = spotTagMap[s.id] || [];
  const eras2  = spotEraMap[s.id] || [];
  document.getElementById('m-pref').textContent   = s.prefectures?.name || '';
  document.getElementById('m-name').textContent   = s.name;
  document.getElementById('m-desc').textContent   = s.description || '';
  document.getElementById('m-addr').textContent   = s.address || '—';
  document.getElementById('m-access').textContent = s.access_info || '—';
  document.getElementById('m-hours').textContent  = s.open_hours || '—';

  const feeRow = document.getElementById('m-fee-row');
  if (s.is_free) {
    feeRow.style.display = 'flex';
    document.getElementById('m-fee').textContent = '無料';
  } else {
    feeRow.style.display = 'none';
  }

  const urlEl  = document.getElementById('m-url');
  const urlRow = document.getElementById('m-url-row');
  if (s.website_url) {
    urlEl.href = s.website_url;
    urlEl.textContent = s.website_url;
    urlRow.style.display = 'flex';
  } else {
    urlRow.style.display = 'none';
  }
  const erasEl = document.getElementById('m-eras');
  erasEl.innerHTML = eras2.map(e =>
    `<span class="era-chip" style="color:${e.color_hex};border-color:${e.color_hex}">${e.name_ja}時代</span>`
  ).join('');
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  if (btn.id === 'free-only-btn') {
    freeOnly = !freeOnly;
    btn.classList.toggle('active', freeOnly);
  } else if (btn.dataset.pref !== undefined) {
    document.querySelectorAll('[data-pref]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPref = btn.dataset.pref;
  }
  renderSpots();
});

document.getElementById('infra-btns').addEventListener('click', e => {
  const btn = e.target.closest('.infra-btn');
  if (!btn) return;
  selectedInfra = btn.dataset.infra;
  document.querySelectorAll('.infra-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.infra === selectedInfra);
  });
  renderSpots();
});

function drawDonut(rate, color, canvasId) {
  const canvas = document.getElementById(canvasId || 'donut-canvas');
  if (!canvas) return;
  const ctx  = canvas.getContext('2d');
  const cx   = 36, cy = 36, r = 28, inner = 18;
  const start = -Math.PI / 2;
  const end   = start + (rate / 100) * 2 * Math.PI;
  ctx.clearRect(0, 0, 72, 72);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.arc(cx, cy, inner, 0, 2 * Math.PI, true);
  ctx.fillStyle = '#e2e8f0';
  ctx.fill('evenodd');
  if (rate > 0) {
    ctx.beginPath();
    ctx.moveTo(cx + inner * Math.cos(start), cy + inner * Math.sin(start));
    ctx.arc(cx, cy, r, start, end);
    ctx.arc(cx, cy, inner, end, start, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }
}

init();
</script>
</body>
</html>
