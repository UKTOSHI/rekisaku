<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歴索（レキサク）— 歴史時代別 社会科見学スポット</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink:    #1c1a15;
  --paper:  #f5f0e8;
  --sepia:  #8b6f47;
  --light:  #ede8dc;
  --accent: #6b4c2a;
  --gold:   #c9923a;
  --muted:  #7a6e5f;
  --white:  #fff;
  --free-bg:#e8f5ee;
  --free-tx:#2d7a4f;
  --serif:  'Noto Serif JP', serif;
  --sans:   'Noto Sans JP', sans-serif;
  --radius: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);min-height:100vh}

/* ヘッダー */
header{background:var(--ink);color:var(--paper);padding:1.25rem 1.5rem;display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap}
.site-name{font-family:var(--serif);font-size:1.5rem;font-weight:600;letter-spacing:.05em}
.site-tagline{font-size:.75rem;color:var(--gold);letter-spacing:.08em}

/* 時代タブ */
.era-bar{background:var(--ink);border-top:1px solid #333;overflow-x:auto;scrollbar-width:none}
.era-bar::-webkit-scrollbar{display:none}
.era-tabs{display:flex;gap:0;padding:.25rem 1rem;min-width:max-content}
.era-tab{font-family:var(--serif);font-size:.8rem;color:#999;padding:.5rem .75rem;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;letter-spacing:.03em}
.era-tab:hover{color:var(--paper)}
.era-tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* 時代メタ情報 */
.era-meta{background:var(--light);border-bottom:1px solid #ddd6c8;padding:1rem 1.5rem}
.era-meta-name{font-family:var(--serif);font-size:1.1rem;font-weight:600;margin-bottom:.2rem}
.era-period{font-size:.75rem;color:var(--muted);margin-bottom:.6rem}
.era-desc{font-size:.8rem;color:var(--accent);line-height:1.7;max-width:700px;margin-bottom:.75rem}
.score-wrap{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
.score-donut-wrap{position:relative;width:72px;height:72px;flex-shrink:0}
.score-donut-wrap canvas{position:absolute;top:0;left:0}
.score-donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;line-height:1.2}
.score-donut-pct{font-size:.85rem;font-weight:600;color:var(--accent)}
.score-donut-sub{font-size:.55rem;color:var(--muted)}
.score-badge{font-size:.67rem;padding:1px 7px;border-radius:10px;font-weight:500;background:#fef3cd;color:#856404;border:1px solid #f0d070}
.era-tech{font-size:.78rem;color:var(--muted);line-height:1.7;max-width:700px;border-left:2px solid var(--gold);padding-left:.75rem;margin-top:.5rem}

/* 人口・農業グラフ */
.era-stats{display:flex;gap:1.5rem;align-items:flex-start;margin-top:.75rem;flex-wrap:wrap}
.stat-pop{display:flex;flex-direction:column;gap:.2rem;align-items:center}
.stat-pop-label{font-size:.68rem;color:var(--muted);text-align:center}
.stat-pop-val{font-size:1.3rem;font-weight:600;font-family:var(--serif);color:var(--accent);line-height:1;text-align:center}
.stat-pop-unit{font-size:.68rem;color:var(--muted);text-align:center}
.stat-life{display:flex;flex-direction:column;gap:.2rem;align-items:center}
.life-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:var(--accent);line-height:1.4;text-align:center}
.stat-chart-label{font-size:.68rem;color:var(--muted);text-align:center}
.donut-wrap{position:relative;width:72px;height:72px}
.donut-wrap canvas{position:absolute;top:0;left:0}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;line-height:1.2}
.donut-pct{font-size:.85rem;font-weight:600;color:var(--accent)}
.donut-sub{font-size:.55rem;color:var(--muted)}
.stat-speed{display:flex;flex-direction:column;gap:.3rem;align-items:center}
.speed-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:var(--accent);line-height:1.2;text-align:center}
.speed-desc{font-size:.68rem;color:var(--muted);line-height:1.4;max-width:160px;text-align:center}
.stat-industry{display:flex;flex-direction:column;gap:.3rem;align-items:center}
.industry-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:var(--accent);line-height:1.4;text-align:center}
.stat-media{display:flex;flex-direction:column;gap:.3rem;align-items:center}
.media-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:var(--accent);line-height:1.4;text-align:center}
.stat-gov{display:flex;flex-direction:column;gap:.3rem;align-items:center}
.gov-val{font-size:.9rem;font-weight:600;font-family:var(--serif);color:var(--accent);line-height:1.4;text-align:center}
.stat-pop-label,.stat-chart-label,.stat-speed .stat-pop-label,.stat-industry .stat-pop-label,.stat-media .stat-pop-label,.stat-gov .stat-pop-label,.stat-life .stat-pop-label{text-align:center}

/* フィルター行 */
.filters{padding:.75rem 1.5rem;display:flex;gap:.5rem;flex-wrap:wrap;border-bottom:1px solid #ddd6c8;background:var(--white)}
.filter-btn{font-size:.75rem;padding:.3rem .75rem;border-radius:20px;border:1px solid #ccc;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--sans);transition:all .15s}
.filter-btn:hover{border-color:var(--sepia);color:var(--ink)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:var(--white)}
.filter-sep{width:1px;background:#ddd;margin:.1rem 0;align-self:stretch}

/* スポットグリッド */
.main{padding:1.25rem 1.5rem}
.spots-count{font-size:.75rem;color:var(--muted);margin-bottom:1rem}
.spots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

/* スポットカード */
.spot-card{background:var(--white);border:1px solid #e0d9cd;border-radius:var(--radius);padding:1rem;cursor:pointer;transition:border-color .15s,transform .1s;display:flex;flex-direction:column;gap:.5rem}
.spot-card:hover{border-color:var(--sepia);transform:translateY(-1px)}
.spot-stars{font-size:.75rem;line-height:1;letter-spacing:.05em}
.star-filled{color:var(--gold)}
.star-empty{display:none}
.spot-pref{font-size:.7rem;color:var(--muted);letter-spacing:.05em}
.spot-name{font-family:var(--serif);font-size:1rem;font-weight:600;color:var(--ink);line-height:1.4}
.spot-desc{font-size:.78rem;color:var(--muted);line-height:1.6;flex:1}
.spot-tags{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.25rem}
.tag{font-size:.65rem;padding:.2rem .5rem;border-radius:4px;border:1px solid #e0d9cd;color:var(--muted)}
.tag.free{background:var(--free-bg);border-color:#9edbb8;color:var(--free-tx)}
.tag.reserve{background:#fff8ec;border-color:#f0c87a;color:#7a5a10}
.spot-access{font-size:.7rem;color:var(--sepia);margin-top:.25rem;line-height:1.5}
.spot-stars{font-size:.72rem;letter-spacing:-.05em;margin-left:.3rem}
.spot-stars[data-rating="5"]{color:var(--gold)}
.spot-stars[data-rating="4"]{color:#b8882a}
.spot-stars[data-rating="3"]{color:#a09080}
.spot-stars[data-rating="2"]{color:#c0b8b0}
.spot-stars[data-rating="1"]{color:#d0ccc8}

/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius);max-width:540px;width:100%;max-height:90vh;overflow-y:auto;padding:1.5rem;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.2rem;color:var(--muted);cursor:pointer;line-height:1}
.modal-pref{font-size:.75rem;color:var(--muted);margin-bottom:.25rem}
.modal-name{font-family:var(--serif);font-size:1.4rem;font-weight:600;margin-bottom:.5rem;line-height:1.4}
.modal-desc{font-size:.85rem;color:#444;line-height:1.8;margin-bottom:1rem}
.modal-rows{display:flex;flex-direction:column;gap:.5rem;font-size:.8rem}
.modal-row{display:flex;gap:.75rem}
.modal-label{color:var(--muted);flex-shrink:0;width:70px}
.modal-val{color:var(--ink);line-height:1.5}
.modal-link{color:var(--gold);word-break:break-all}
.modal-eras{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem}
.era-chip{font-size:.7rem;padding:.25rem .6rem;border-radius:20px;border:1px solid;font-family:var(--serif)}

/* 空・ローディング */
.state-msg{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.85rem}
.loading-dots{display:inline-flex;gap:.3rem}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--sepia);animation:bounce .8s infinite}
.loading-dots span:nth-child(2){animation-delay:.15s}
.loading-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}

/* フッター */
footer{text-align:center;padding:2rem;font-size:.7rem;color:var(--muted);border-top:1px solid #ddd6c8;margin-top:2rem}

@media(max-width:600px){
  .main{padding:1rem}
  .spots-grid{grid-template-columns:1fr}
  header{padding:1rem}
  .site-name{font-size:1.2rem}
  .filters{padding:.5rem 1rem}
}
</style>
</head>
<body>

<header>
  <div class="site-name">歴索</div>
  <div class="site-tagline">レキサク — 歴史時代別 社会科見学スポット 関東版</div>
</header>

<nav class="era-bar">
  <div class="era-tabs" id="era-tabs"></div>
</nav>

<div class="era-meta" id="era-meta">
  <div class="era-meta-name"></div>
  <div class="era-period"></div>
  <div class="era-desc"></div>
  <div id="score-badge-wrap" style="display:none;margin-bottom:.5rem"><span class="score-badge" id="score-badge"></span></div>
  <div class="era-tech" id="era-tech" style="display:none"></div>
  <div class="era-stats" id="era-stats" style="display:none">
    <div class="stat-pop">
      <div class="stat-pop-label">推定人口</div>
      <div style="text-align:center"><span class="stat-pop-val" id="stat-pop-val">—</span> <span class="stat-pop-unit">万人</span></div>
    </div>
    <div class="stat-life" id="stat-life" style="display:none">
      <div class="stat-pop-label">平均寿命</div>
      <div class="life-val" id="life-val"></div>
    </div>
    <div id="score-wrap" style="display:none">
      <div class="stat-chart">
        <div class="stat-chart-label">人力依存率</div>
        <div class="score-donut-wrap">
          <canvas id="score-donut-canvas" width="72" height="72"></canvas>
          <div class="score-donut-center">
            <div class="score-donut-pct" id="score-num"></div>
            <div class="score-donut-sub">人力</div>
          </div>
        </div>
      </div>
    </div>
    <div class="stat-chart">
      <div class="stat-chart-label">農業人口率</div>
      <div class="donut-wrap">
        <canvas id="donut-canvas" width="72" height="72"></canvas>
        <div class="donut-center">
          <div class="donut-pct" id="donut-pct">—</div>
          <div class="donut-sub">農業</div>
        </div>
      </div>
    </div>
    <div class="stat-gov" id="stat-gov" style="display:none">
      <div class="stat-pop-label">国の体制</div>
      <div class="gov-val" id="gov-val"></div>
    </div>
    <div class="stat-speed" id="stat-speed" style="display:none">
      <div class="stat-pop-label">技術進化スピード</div>
      <div class="speed-val" id="speed-val"></div>
      <div class="speed-desc" id="speed-desc"></div>
    </div>
    <div class="stat-industry" id="stat-industry" style="display:none">
      <div class="stat-pop-label">主要産業</div>
      <div class="industry-val" id="industry-val"></div>
    </div>
    <div class="stat-media" id="stat-media" style="display:none">

  </div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-pref="">全地域</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" data-pref="東京">東京</button>
  <button class="filter-btn" data-pref="神奈川">神奈川</button>
  <button class="filter-btn" data-pref="千葉">千葉</button>
  <button class="filter-btn" data-pref="埼玉">埼玉</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" id="free-only-btn" data-free="0">無料のみ</button>
</div>

<main class="main">
  <div class="spots-count" id="spots-count"></div>
  <div class="spots-grid" id="spots-grid">
    <div class="state-msg"><div class="loading-dots"><span></span><span></span><span></span></div></div>
  </div>
</main>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    <div class="modal-pref" id="m-pref"></div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-desc" id="m-desc"></div>

      <div class="modal-row"><span class="modal-label">住所</span><span class="modal-val" id="m-addr"></span></div>
      <div class="modal-row"><span class="modal-label">アクセス</span><span class="modal-val" id="m-access"></span></div>
      <div class="modal-row"><span class="modal-label">開館時間</span><span class="modal-val" id="m-hours"></span></div>
      <div class="modal-row"><span class="modal-label">入場料</span><span class="modal-val" id="m-fee"></span></div>
      <div class="modal-row" id="m-url-row"><span class="modal-label">公式サイト</span><a class="modal-link modal-val" id="m-url" target="_blank" rel="noopener"></a></div>
    </div>
    <div class="modal-eras" id="m-eras"></div>
  </div>
</div>

<footer>&copy; 2026 Produced by サークルアスト</footer>

<script>
const SUPABASE_URL  = 'https://sunxpjbdvidftukiutxg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN1bnhwamJkdmlkZnR1a2l1dHhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTU1MDUsImV4cCI6MjA5MDEzMTUwNX0.L9RU4U3kWy4CJzyVR4FEKUrDX8fD2jzWAbQxyaDOIsU';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let eras        = [];
let allSpots    = [];
let spotEraMap  = {};   // spot_id -> [era codes]
let spotTagMap  = {};   // spot_id -> [tag names]
let currentEra  = null;
let currentPref = '';
let freeOnly    = false;

async function init() {
  // 時代マスター取得
  const { data: eraData } = await db.from('eras').select('*').order('sort_order');
  eras = eraData || [];
  buildEraTabs();

  // 全スポット取得（都道府県JOIN）
  const { data: spotData } = await db
    .from('spots')
    .select('*, prefectures(name)')
    .eq('status', true);
  allSpots = spotData || [];

  // spot_eras取得（時代コードも一緒に）
  const { data: seData } = await db
    .from('spot_eras')
    .select('spot_id, eras(code, name_ja, color_hex)');
  (seData || []).forEach(r => {
    if (!spotEraMap[r.spot_id]) spotEraMap[r.spot_id] = [];
    spotEraMap[r.spot_id].push(r.eras);
  });

  // spot_tags取得
  const { data: stData } = await db
    .from('spot_tags')
    .select('spot_id, tags(name, category)');
  (stData || []).forEach(r => {
    if (!spotTagMap[r.spot_id]) spotTagMap[r.spot_id] = [];
    spotTagMap[r.spot_id].push(r.tags.name);
  });

  // 最初の時代を選択
  if (eras.length) selectEra(eras[0]);
}

function buildEraTabs() {
  const container = document.getElementById('era-tabs');
  eras.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'era-tab';
    btn.textContent = e.name_ja;
    btn.onclick = () => selectEra(e);
    btn.id = 'era-tab-' + e.id;
    container.appendChild(btn);
  });
}

function selectEra(era) {
  currentEra = era;
  document.querySelectorAll('.era-tab').forEach(b => b.classList.remove('active'));
  const tab = document.getElementById('era-tab-' + era.id);
  if (tab) {
    tab.classList.add('active');
    tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
  // 基本メタ情報
  const meta = document.getElementById('era-meta');
  meta.querySelector('.era-meta-name').textContent = era.name_ja + '時代';
  meta.querySelector('.era-meta-name').style.color = era.color_hex || '#1c1a15';
  meta.querySelector('.era-period').textContent = era.period;
  meta.querySelector('.era-desc').textContent = era.description || '';

  // 人力依存率ドーナツグラフ
  const score = era.human_labor_score;
  const scoreWrap = document.getElementById('score-wrap');
  if (score != null) {
    scoreWrap.style.display = 'flex';
    const color = score > 60 ? '#8b6f47' : score > 45 ? '#c9923a' : '#2d6fa8';
    const num = document.getElementById('score-num');
    num.textContent = score + '%';
    num.style.color = color;
    drawDonut(score, color, 'score-donut-canvas');
    // 革命バッジ
    const revolutions = {meiji:'★第1革命 蒸気・電気', showa_mid:'★第2革命 三種の神器', heisei:'★第3革命 インターネット'};
    const badge = document.getElementById('score-badge');
    const badgeWrap = document.getElementById('score-badge-wrap');
    if (revolutions[era.code]) {
      badge.textContent    = revolutions[era.code];
      badgeWrap.style.display = 'block';
    } else {
      badgeWrap.style.display = 'none';
    }
  } else {
    scoreWrap.style.display = 'none';
  }

  // テクノロジー説明
  const techEl = document.getElementById('era-tech');
  if (era.technology) {
    techEl.textContent    = era.technology;
    techEl.style.display  = 'block';
  } else {
    techEl.style.display  = 'none';
  }

  // 人口・農業率グラフ
  const statsEl = document.getElementById('era-stats');
  if (era.population_man != null) {
    statsEl.style.display = 'flex';
    // 人口表示
    document.getElementById('stat-pop-val').textContent =
      era.population_man >= 10000
        ? (era.population_man / 10000).toFixed(1) + '億'
        : era.population_man.toLocaleString();
    document.querySelector('.stat-pop-unit').textContent =
      era.population_man >= 10000 ? '人' : '万人';
    // 平均寿命
    const lifeEl = document.getElementById('stat-life');
    if (era.life_expectancy) {
      lifeEl.style.display = 'flex';
      document.getElementById('life-val').textContent = era.life_expectancy;
    } else {
      lifeEl.style.display = 'none';
    }
    // ドーナツグラフ
    const rate   = era.farming_rate ?? 0;
    document.getElementById('donut-pct').textContent = rate + '%';
    drawDonut(rate, era.color_hex || '#c9923a', 'donut-canvas');
    // 進化スピード
    const speedEl = document.getElementById('stat-speed');
    const mul = era.speed_multiplier;
    const animal = era.speed_animal;
    if (animal) {
      speedEl.style.display = 'flex';
      document.getElementById('speed-val').textContent = animal;
      document.getElementById('speed-desc').textContent = '';
    } else {
      speedEl.style.display = 'none';
    }
    // 主要産業
    const indEl = document.getElementById('stat-industry');
    if (era.main_industries) {
      indEl.style.display = 'flex';
      document.getElementById('industry-val').textContent = era.main_industries;
    } else {
      indEl.style.display = 'none';
    }
    // 情報の主体
    const mediaEl = document.getElementById('stat-media');
    if (era.info_media) {
      mediaEl.style.display = 'flex';
      document.getElementById('media-val').textContent = era.info_media;
    } else {
      mediaEl.style.display = 'none';
    }
    // 国の体制
    const govEl = document.getElementById('stat-gov');
    if (era.government_system) {
      govEl.style.display = 'flex';
      document.getElementById('gov-val').textContent = era.government_system;
    } else {
      govEl.style.display = 'none';
    }
  } else {
    statsEl.style.display = 'none';
  }

  renderSpots();
}

function renderSpots() {
  // 現在の時代に属するspot_idを抽出
  const eraSpotIds = new Set(
    Object.entries(spotEraMap)
      .filter(([, eras]) => eras.some(e => e.code === currentEra.code))
      .map(([id]) => id)
  );
  let filtered = allSpots.filter(s => eraSpotIds.has(s.id));
  if (currentPref) filtered = filtered.filter(s => s.prefectures?.name === currentPref);
  if (freeOnly)    filtered = filtered.filter(s => s.is_free);

  const grid  = document.getElementById('spots-grid');
  const count = document.getElementById('spots-count');
  count.textContent = filtered.length + ' 件のスポット';

  if (!filtered.length) {
    grid.innerHTML = '<div class="state-msg">このエリアのスポットは現在収集中です</div>';
    return;
  }
  grid.innerHTML = '';
  // ☆5を先頭に
  filtered.sort((a, b) => (b.star_rating || 3) - (a.star_rating || 3));
  filtered.forEach(s => {
    const tags  = spotTagMap[s.id] || [];
    const card  = document.createElement('div');
    card.className = 'spot-card';
    card.onclick   = () => openModal(s);
    const tagHtml = tags.map(t => {
      let cls = 'tag';
      if (t === '無料') cls += ' free';
      if (t === '要予約') cls += ' reserve';
      return `<span class="${cls}">${t}</span>`;
    }).join('');
    const stars = s.star_rating || 3;
    const starHtml = '<span class="star-filled">' + '★'.repeat(stars) + '</span><span class="star-empty">' + '☆'.repeat(5 - stars) + '</span>';
    card.innerHTML = `
      <div class="spot-pref">${s.prefectures?.name || ''} <span class="spot-stars" data-rating="${stars}">${starHtml}</span></div>
      <div class="spot-name">${s.name}</div>
      <div class="spot-desc">${(s.description || '').slice(0, 80)}${(s.description || '').length > 80 ? '…' : ''}</div>
      <div class="spot-tags">${tagHtml}</div>
      ${s.access_info ? `<div class="spot-access">${s.access_info}</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function openModal(s) {
  const tags   = spotTagMap[s.id] || [];
  const eras2  = spotEraMap[s.id] || [];
  document.getElementById('m-pref').textContent   = s.prefectures?.name || '';
  document.getElementById('m-name').textContent   = s.name;
  document.getElementById('m-desc').textContent   = s.description || '';
  document.getElementById('m-addr').textContent   = s.address || '—';
  document.getElementById('m-access').textContent = s.access_info || '—';
  document.getElementById('m-hours').textContent  = s.open_hours || '—';
  document.getElementById('m-fee').textContent    = s.admission_fee || '—';
  const urlEl  = document.getElementById('m-url');
  const urlRow = document.getElementById('m-url-row');
  if (s.website_url) {
    urlEl.href = s.website_url;
    urlEl.textContent = s.website_url;
    urlRow.style.display = 'flex';
  } else {
    urlRow.style.display = 'none';
  }
  const erasEl = document.getElementById('m-eras');
  erasEl.innerHTML = eras2.map(e =>
    `<span class="era-chip" style="color:${e.color_hex};border-color:${e.color_hex}">${e.name_ja}時代</span>`
  ).join('');
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

// フィルター
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  if (btn.id === 'free-only-btn') {
    freeOnly = !freeOnly;
    btn.classList.toggle('active', freeOnly);
  } else if (btn.dataset.pref !== undefined) {
    document.querySelectorAll('[data-pref]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPref = btn.dataset.pref;
  }
  renderSpots();
});

function drawDonut(rate, color, canvasId) {
  const canvas = document.getElementById(canvasId || 'donut-canvas');
  if (!canvas) return;
  const ctx  = canvas.getContext('2d');
  const cx   = 36, cy = 36, r = 28, inner = 18;
  const start = -Math.PI / 2;
  const end   = start + (rate / 100) * 2 * Math.PI;
  ctx.clearRect(0, 0, 72, 72);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.arc(cx, cy, inner, 0, 2 * Math.PI, true);
  ctx.fillStyle = '#d9d2c5';
  ctx.fill('evenodd');
  if (rate > 0) {
    ctx.beginPath();
    ctx.moveTo(cx + inner * Math.cos(start), cy + inner * Math.sin(start));
    ctx.arc(cx, cy, r, start, end);
    ctx.arc(cx, cy, inner, end, start, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }
}

init();
</script>
